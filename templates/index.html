<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CV Scorer</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark text-light">

<div class="container py-5" style="max-width: 700px;">
  <h2 class="mb-4">📋 Job Post Builder</h2>

  {% if error_message %}
  <div class="alert alert-danger" role="alert">
    {{ error_message }}
  </div>
  {% endif %}

  <form action="/score" method="POST" enctype="multipart/form-data">

    <!-- Job Title -->
    <div class="mb-3">
      <label class="form-label">Job Title</label>
      <input type="text" class="form-control" name="job_title" placeholder="e.g. Backend Developer" required>
    </div>

    <!-- Role Category -->
    <div class="mb-3">
      <label class="form-label">Role Category</label>
      <select class="form-select" name="role_category">
        <option value="software" selected>Software / Engineering</option>
        <option value="management">Management / Leadership</option>
        <option value="data">Data / Analytics</option>
        <option value="design">Design / UX</option>
        <option value="ops">Operations / Project Management</option>
        <option value="finance">Finance / Accounting</option>
        <option value="marketing">Marketing / Growth</option>
      </select>
    </div>

    <!-- Seniority -->
    <div class="mb-3">
      <label class="form-label">Seniority Expected</label>
      <select class="form-select" name="seniority">
        <option value="intern">Intern</option>
        <option value="junior">Junior</option>
        <option value="mid" selected>Mid</option>
        <option value="senior">Senior</option>
        <option value="lead">Lead</option>
      </select>
    </div>

    <!-- Years Required -->
    <div class="mb-3">
      <label class="form-label">Minimum Years of Experience</label>
      <input type="number" class="form-control" name="years_required" min="0" max="30" value="2">
    </div>

    <!-- Skills -->
    <div class="mb-3">
      <label class="form-label">Required Skills <span class="text-muted">(comma separated)</span></label>
      <input type="text" class="form-control" name="skills" placeholder="e.g. Python, Flask, PostgreSQL, Docker">
    </div>

    <!-- Education -->
    <div class="mb-3">
      <label class="form-label">Education Required</label>
      <select class="form-select" name="education">
        <option value="none">None required</option>
        <option value="high_school">High School</option>
        <option value="bachelor">Bachelor's</option>
        <option value="master">Master's</option>
        <option value="phd">PhD</option>
      </select>
    </div>



    <!-- CV Upload -->
    <div class="mb-4">
      <label class="form-label">Upload CV <span class="text-muted">(.pdf, .docx)</span></label>
      <input type="file" class="form-control" name="cv" accept=".pdf,.docx" required>
    </div>

    <button id="submitBtn" type="submit" class="btn btn-primary w-100">Score CV 🚀</button>

    <div id="loading" class="text-center mt-4" style="display: none;">
     <div class="spinner-border text-light" role="status"></div>
      <p class="mt-2 text-muted">Analyzing CV...</p>
    </div>

  </form>
</div>

   <script>
    document.querySelector("form").addEventListener("submit", function() {
      const submitBtn = document.getElementById("submitBtn");
      submitBtn.disabled = true;
      document.getElementById("loading").style.display = "block";
    });
  </script>
</body>
</html>
